version: '3.8'

services:
  # Backend API
  backend:
    build: 
      context: ./telegram-app-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      - JWT_DELIVERY_SECRET=${JWT_DELIVERY_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_ALGORITHMS=${JWT_ALGORITHMS}
      - JWT_CLOCK_TOLERANCE=${JWT_CLOCK_TOLERANCE}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - REFRESH_TOKEN_IP_BINDING=${REFRESH_TOKEN_IP_BINDING}
      - REFRESH_TOKEN_UA_BINDING=${REFRESH_TOKEN_UA_BINDING}
      - PASSWORD_MIN_LENGTH=${PASSWORD_MIN_LENGTH}
      - PASSWORD_REQUIRE_COMPLEXITY=${PASSWORD_REQUIRE_COMPLEXITY}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED}
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET}
      - SUPABASE_SIGNED_URL_TTL=${SUPABASE_SIGNED_URL_TTL}
      - OPENSEARCH_URL=${OPENSEARCH_URL}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_INDEX_PREFIX=${OPENSEARCH_INDEX_PREFIX}
      - OPENSEARCH_SYNONYMS=${OPENSEARCH_SYNONYMS}
      - OPENSEARCH_MIN_RESULTS=${OPENSEARCH_MIN_RESULTS}
      - OPENSEARCH_SEMANTIC_K=${OPENSEARCH_SEMANTIC_K}
      - SEARCH_RRF_K=${SEARCH_RRF_K}
      - EMBEDDINGS_URL=${EMBEDDINGS_URL}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL}
      - EMBEDDINGS_DIM=${EMBEDDINGS_DIM}
      - EMBEDDINGS_TIMEOUT_MS=${EMBEDDINGS_TIMEOUT_MS}
      - EMBEDDINGS_CACHE_SIZE=${EMBEDDINGS_CACHE_SIZE}
      - EMBEDDINGS_CONCURRENCY=${EMBEDDINGS_CONCURRENCY}
      - OPENSEARCH_KNN_ENGINE=${OPENSEARCH_KNN_ENGINE}
      - OPENSEARCH_KNN_SPACE=${OPENSEARCH_KNN_SPACE}
      - OPENSEARCH_KNN_METHOD=${OPENSEARCH_KNN_METHOD}
      - OPENSEARCH_KNN_EF_CONSTRUCTION=${OPENSEARCH_KNN_EF_CONSTRUCTION}
      - OPENSEARCH_KNN_M=${OPENSEARCH_KNN_M}
      - IDEMPOTENCY_TTL_SECONDS=${IDEMPOTENCY_TTL_SECONDS}
      - IDEMPOTENCY_STALE_MS=${IDEMPOTENCY_STALE_MS}
    volumes:
      - ./telegram-app-backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # Background worker for notifications
  worker:
    build:
      context: ./telegram-app-backend
      dockerfile: Dockerfile
    command: npm run worker:notifications
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      - JWT_DELIVERY_SECRET=${JWT_DELIVERY_SECRET}
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_SENDER_ONLY=true
    volumes:
      - ./telegram-app-backend:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  # Background worker for pricing adjustments
  worker-pricing:
    build:
      context: ./telegram-app-backend
      dockerfile: Dockerfile
    command: npm run worker:pricing
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      - JWT_DELIVERY_SECRET=${JWT_DELIVERY_SECRET}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./telegram-app-backend:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=medical_expo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis (cache + rate limiting)
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  # Customer TMA (Development Server)
  customer-tma:
    build:
      context: ./my-telegram-app
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    volumes:
      - ./my-telegram-app:/app
      - /app/node_modules
    networks:
      - app-network

  # Delivery Agent TMA (Development Server)
  delivery-tma:
    build:
      context: ./delivery-agent-tma
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5173"
    environment:
      - VITE_DELIVERY_API_BASE_URL=http://localhost:3001
    volumes:
      - ./delivery-agent-tma:/app
      - /app/node_modules
    networks:
      - app-network

  # Supplier Admin Panel (Development Server)
  supplier-panel:
    build:
      context: ./supplier-admin-panel
      dockerfile: Dockerfile.dev
    ports:
      - "5175:5173"
    environment:
      - VITE_SUPPLIER_API_BASE_URL=http://localhost:3001
      - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
      - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
    volumes:
      - ./supplier-admin-panel:/app
      - /app/node_modules
    networks:
      - app-network

  # Platform Admin Panel (Development Server)
  admin-panel:
    build:
      context: ./platform-admin-panel
      dockerfile: Dockerfile.dev
    ports:
      - "5176:5173"
    environment:
      - VITE_ADMIN_API_BASE_URL=http://localhost:3001
    volumes:
      - ./platform-admin-panel:/app
      - /app/node_modules
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
